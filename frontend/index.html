<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>J.A.R.V.I.S</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── TOP BAR: drag + branding + status + clock + controls ── -->
  <header id="titlebar">
    <div class="bar-left">
      <span class="logo">J.A.R.V.I.S</span>
      <span class="tag">LOCAL AI</span>
    </div>
    <div class="bar-center">
      <span class="pulse-dot" id="pulse-dot"></span>
      <span class="status-label" id="status-label">INITIALISING</span>
    </div>
    <div class="bar-right">
      <span class="clock" id="clock">--:--:--</span>
      <button class="wc-btn" id="btn-minimize" title="Minimize">—</button>
      <button class="wc-btn wc-close" id="btn-close" title="Close">✕</button>
    </div>
  </header>

  <!-- ── CORNER BRACKETS ── -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- ── SCAN LINE (decorative) ── -->
  <div class="scanline"></div>

  <!-- ── MAIN HUD ── -->
  <div id="hud-main">

    <!-- Left panel: system status + live activity feed -->
    <aside id="panel-left">
      <div class="p-header">SYS STATUS</div>
      <div class="p-body" id="left-body">

        <!-- compact stats (fixed at top) -->
        <div class="stat-block">
          <div class="srow"><span class="slbl">DATE</span><span class="sval" id="sval-date">—</span></div>
          <div class="srow"><span class="slbl">SESSION</span><span class="sval" id="sval-uptime">00:00</span></div>
          <div class="srow"><span class="slbl">AI CORE</span><span class="sval">CLAUDE</span></div>
          <div class="srow"><span class="slbl">MODE</span><span class="sval on">ALWAYS ON</span></div>
          <div class="srow"><span class="slbl">MIC LEVEL</span></div>
          <div class="amp-bar"><div class="amp-fill" id="amp-fill"></div></div>
        </div>

        <div class="feed-header">LIVE FEED</div>

        <!-- always-visible activity feed -->
        <div class="activity-feed" id="activity-log">
          <!-- live entries appended by renderer.js -->
        </div>
      </div>
    </aside>

    <!-- Center: Three.js orb + status -->
    <main id="orb-area">
      <div id="canvas-wrap"></div>
      <p class="query-text" id="query-text"></p>
      <p class="operator-status" id="operator-status"></p>
      <span class="hint">Always listening — just speak</span>
    </main>

    <!-- Right panel: conversation log -->
    <aside id="panel-right">
      <div class="p-header">CHAT LOG</div>
      <div class="p-body" id="comm-log">
        <!-- Conversation messages appended by renderer.js -->
      </div>
    </aside>

  </div>

  <!-- Three.js from CDN (no bundler needed) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
